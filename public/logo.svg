<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="handle-grad" x1="300" y1="300" x2="410" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.85"/>
    </linearGradient>
    <clipPath id="lens-clip">
      <circle cx="220" cy="220" r="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Soft ambient glow behind glass -->
  <circle cx="220" cy="220" r="130" fill="#a78bfa" opacity="0.12"/>

  <!-- Magnifying glass ring -->
  <circle cx="220" cy="220" r="100" stroke="white" stroke-width="28" fill="rgba(255,255,255,0.06)"/>

  <!-- Shine highlight on glass rim (top-left arc) -->
  <path d="M152 172 A88 88 0 0 1 268 152" stroke="white" stroke-opacity="0.45" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- Star inside the lens — properly proportioned 5-point star -->
  <g clip-path="url(#lens-clip)">
    <path d="
      M220 138
      L237.6 189.2
      L292  189.2
      L247.2 220.8
      L264.8 272
      L220  242
      L175.2 272
      L192.8 220.8
      L148  189.2
      L202.4 189.2
      Z
    " fill="white" opacity="0.92"/>
  </g>

  <!-- Handle -->
  <line x1="298" y1="298" x2="396" y2="396" stroke="url(#handle-grad)" stroke-width="34" stroke-linecap="round"/>

  <!-- Handle highlight line -->
  <line x1="306" y1="292" x2="388" y2="374" stroke="white" stroke-opacity="0.2" stroke-width="8" stroke-linecap="round"/>
</svg>
